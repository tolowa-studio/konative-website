name: Governors maintain — weekly report

# Report-only: Sanity counts, state gaps, soft RSS scan. No auto-seed writes.
#
# Required secrets: SANITY_API_TOKEN
# Optional: NEXT_PUBLIC_SANITY_PROJECT_ID, NEXT_PUBLIC_SANITY_DATASET

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

jobs:
  maintain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Run governors maintenance agent
        run: npx tsx scripts/agents/governors-maintain.ts
        working-directory: web
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: governors-maintain-report
          path: docs/outreach/artifacts/*-governors-maintain-report.md
          if-no-files-found: warn
