name: Tribal Infrastructure Brief — draft

# Biweekly Ghost draft from Sanity tribal news + project registry.
# Review in Ghost Admin before publish/send (does not auto-email).
#
# Required secrets: SANITY_API_TOKEN, GHOST_URL, GHOST_ADMIN_API_KEY
# Optional: NEXT_PUBLIC_SANITY_PROJECT_ID, NEXT_PUBLIC_SANITY_DATASET

on:
  schedule:
    # 1st and 15th, 14:00 UTC (~7am PT)
    - cron: "0 14 1,15 * *"
  workflow_dispatch:

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Generate and publish Ghost draft
        run: npm run draft:tribal-brief:publish
        working-directory: web
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          GHOST_URL: ${{ secrets.GHOST_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
          NEXT_PUBLIC_SITE_URL: https://konative.com
