name: Konative Signal Agent — Daily

on:
  schedule:
    # Run every weekday at 6am Pacific (14:00 UTC)
    - cron: '0 14 * * 1-5'
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  run-signal-agent:
    name: Scan FERC + ISO Queues + NTIA TBCP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Run FERC + ISO signal agent
        run: npx tsx scripts/signal-agent-ferc.ts
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run NTIA TBCP award monitor
        run: npx tsx scripts/signal-agent-ntia.ts
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        continue-on-error: true  # don't fail the job if NTIA is temporarily down
