name: Supabase security lint

# Fails on ERROR-level Database Linter findings for konative-intel.
# Supabase CLI token is loaded from GCP Secret Manager (spokanewire) via Workload Identity,
# with fallback to GitHub secret SUPABASE_ACCESS_TOKEN.
#
# One-time bootstrap (from a machine with gcloud + gh auth):
#   cp scripts/gcp-github-secrets.map.example scripts/gcp-github-secrets.map
#   ./scripts/sync-gcp-secrets-to-github.sh

on:
  pull_request:
    paths:
      - 'web/supabase/**'
      - '.github/workflows/supabase-security-lint.yml'
      - 'scripts/check-supabase-security.sh'
      - 'scripts/sync-gcp-secrets-to-github.sh'
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: spokanewire
  GCP_SUPABASE_TOKEN_SECRET: konative-supabase-access-token

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Authenticate to Google Cloud
        id: gcp-auth
        if: vars.GCP_WIF_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Load Supabase token from GCP Secret Manager
        if: steps.gcp-auth.outcome == 'success'
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            SUPABASE_ACCESS_TOKEN:projects/${{ env.GCP_PROJECT_ID }}/secrets/${{ env.GCP_SUPABASE_TOKEN_SECRET }}/versions/latest

      - name: Resolve Supabase access token
        id: resolve-token
        env:
          FALLBACK_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${SUPABASE_ACCESS_TOKEN:-}" ]]; then
            echo "Using Supabase token from GCP Secret Manager."
          elif [[ -n "${FALLBACK_TOKEN}" ]]; then
            echo "Using Supabase token from GitHub secret SUPABASE_ACCESS_TOKEN."
            echo "SUPABASE_ACCESS_TOKEN=${FALLBACK_TOKEN}" >> "$GITHUB_ENV"
          else
            echo "::error::No Supabase token. Run ./scripts/sync-gcp-secrets-to-github.sh or set GCP_WIF_PROVIDER + GCP_SERVICE_ACCOUNT variables and konative-supabase-access-token in GCP."
            exit 1
          fi

      - name: Install Supabase CLI
        run: npm exec --yes supabase@latest -- --version

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}
        run: npm exec --yes supabase@latest -- link --project-ref tcbworxmlmxoyzcvdjhh --yes

      - name: Database security lint
        env:
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}
        run: npm exec --yes supabase@latest -- db lint --linked --fail-on error
