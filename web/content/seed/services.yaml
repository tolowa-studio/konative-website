services:
  - name: "Connectivity Brokerage"
    description: "Carrier-neutral sourcing for internet, fiber, dark fiber, wavelengths, SD-WAN, voice, cloud connectivity, cybersecurity, and managed network services."
    includes:
      - "Requirements intake and supplier matching"
      - "Quote comparison and commercial framing"
      - "Ordering, provisioning, and escalation support"

  - name: "Datacenter Connectivity"
    description: "Site-stage network analysis, dark fiber sourcing, interconnection strategy, and carrier discovery for datacenter and AI infrastructure projects."
    includes:
      - "Route and carrier availability review"
      - "Dark fiber, wavelength, DIA, and cloud on-ramp sourcing"
      - "Supplier shortlist and procurement support"

  - name: "Market Intelligence"
    description: "Connectivity market research across routes, suppliers, datacenter demand, power constraints, and public infrastructure signals."
    includes:
      - "Market briefs and route research"
      - "Datacenter and power signal monitoring"
      - "Coverage and supplier mapping"

  - name: "Lifecycle Advisory"
    description: "Ongoing support after supplier selection, including installation management, escalation, renewal review, and supplier performance context."
    includes:
      - "Project coordination"
      - "Carrier escalation"
      - "Renewal and lifecycle review"
